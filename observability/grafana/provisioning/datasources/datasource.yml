apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      # Enables exemplar support so a latency spike on the P95 graph can be
      # clicked through directly into the exact Jaeger trace responsible.
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: jaeger-datasource

  - name: Jaeger
    type: jaeger
    uid: jaeger-datasource
    access: proxy
    url: http://jaeger:16686
    editable: true
